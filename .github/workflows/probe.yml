# 公式サイト調査用の一時ワークフロー。手動実行のみ。
name: Probe TDR Official Site

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Pythonを準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # requests直叩きは調査済み（全てタイムアウト＝ブロック）。ブラウザ版のみ実行する。
      - name: Playwrightをインストール
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 公式サイトの応答を調査（ブラウザ版）
        run: python probe_tdr_browser.py
